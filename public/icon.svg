<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Subtle Map Pattern -->
  <g stroke="#ffffff" stroke-width="8" opacity="0.15" stroke-linecap="round">
    <line x1="100" y1="100" x2="412" y2="100" />
    <line x1="100" y1="200" x2="412" y2="200" />
    <line x1="100" y1="300" x2="412" y2="300" />
    <line x1="100" y1="400" x2="412" y2="400" />
    <line x1="150" y1="50" x2="150" y2="462" />
    <line x1="256" y1="50" x2="256" y2="462" />
    <line x1="362" y1="50" x2="362" y2="462" />
    <!-- Crossing paths -->
    <path d="M100 350 Q 256 250 412 150" fill="none" />
  </g>

  <!-- Map Pin -->
  <g filter="url(#shadow)" transform="translate(256, 220)">
    <path d="M-130 -40 A 130 130 0 1 1 130 -40 Q 130 90 0 240 Q -130 90 -130 -40 Z" fill="white" />
    
    <!-- Dollar Sign -->
    <path d="M-25 -90 L25 -90 L25 -65 Q55 -65 70 -45 Q85 -25 85 5 L60 5 Q60 -15 50 -25 Q40 -35 20 -35 L-20 -35 Q-35 -35 -42 -28 Q-50 -20 -50 -10 Q-50 0 -42 8 Q-35 15 -20 20 L25 30 Q55 40 70 60 Q85 80 85 110 Q85 140 60 160 Q35 180 0 180 L-25 180 L-25 205 L-55 205 L-55 180 Q-85 180 -100 160 Q-115 140 -115 110 L-90 110 Q-90 130 -80 140 Q-70 150 -50 150 L-10 150 Q5 150 12 142 Q20 135 20 125 Q20 115 12 108 Q5 100 -10 95 L-55 85 Q-85 75 -100 55 Q-115 35 -115 5 Q-115 -25 -90 -45 Q-65 -65 -30 -65 L-55 -65 L-55 -90 Z M0 -10 L0 120" fill="#047857" transform="translate(15, -50) scale(0.8)"/>
    
    <!-- Vertical Line of Dollar -->
    <rect x="-10" y="-100" width="20" height="240" fill="#047857" rx="10" transform="translate(0, -20) scale(0.8)"/>
  </g>
</svg>
