<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="160" fill="url(#grad)" />
  
  <!-- Futuristic Minimalist Shards -->
  <g transform="translate(256, 256)">
    <!-- Top Shard -->
    <path d="M -120 -120 L 80 -120 L -120 80 Z" fill="white" opacity="0.9" />
    
    <!-- Bottom Shard -->
    <path d="M 120 120 L -80 120 L 120 -80 Z" fill="white" />
    
    <!-- Accent Line (The Split) -->
    <line x1="-140" y1="140" x2="140" y2="-140" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5" />
    
    <!-- Center Dot (Focus Point) -->
    <circle cx="0" cy="0" r="15" fill="#1D4ED8" />
  </g>
</svg>
